# Alembic configuration.
#
# The database URL is intentionally left blank here: ``migrations/env.py`` sets it
# at runtime from the application ``Settings`` (``DATABASE_URL``), so credentials
# are never committed and there is a single source of truth for the connection URL.

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
sqlalchemy.url =

# Logging configuration used by Alembic's CLI.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
